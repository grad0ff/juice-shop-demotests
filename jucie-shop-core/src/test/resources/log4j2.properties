property.filepath=../.logs
property.filename=apiui
property.charset=UTF-8
property.pattern=[%-5level] %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] [%X{allureId}] %c{1} - %msg%n

appenders=console, file

appender.console.type=Console
appender.console.name=STDOUT
appender.console.layout.type=PatternLayout
appender.console.layout.charset=${charset}
appender.console.layout.pattern=${pattern}

rootLogger.level=INFO
rootLogger.appenderRefs=console, file
rootLogger.appenderRef.console.ref=STDOUT
rootLogger.appenderRef.file.ref=LOGFILE

appender.file.type=File
appender.file.name=LOGFILE
appender.file.fileName=${filepath}/${filename}.log
appender.file.layout.type=PatternLayout
appender.file.layout.charset=${charset}
appender.file.layout.pattern=${pattern}
